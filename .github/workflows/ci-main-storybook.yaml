name: CI/CD Main Storybook

# Build and publish Storybook off main.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/design-library/**"
      - "apps/web/**"
      - "packages/local-mode/**"
      - "packages/environments/**"
      - "firebase.json"
      - ".github/workflows/ci-main-storybook.yaml"
      - ".github/actions/install-shared-packages/**"

# Serialize per branch and cancel superseded runs so only the newest main
# commit's Storybook publishes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────── design-library ─────────────────────────
  build-design-library-storybook:
    name: Build design-library Storybook
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/design-library
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Storybook
        run: STORYBOOK_BASE_PATH=/design-library/main/ bun run build-storybook

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: design-library-storybook
          path: packages/design-library/storybook-static
          if-no-files-found: error

  # ───────────────────────────── web ─────────────────────────────
  build-web-storybook:
    name: Build web Storybook
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate API clients
        run: bun run openapi-ts

      # apps/web pulls in @vellumai/local-mode and its transitive
      # @vellumai/environments file: dep; both need their own node_modules so
      # vite.config.ts loads at build time.
      - name: Install shared packages
        uses: ./.github/actions/install-shared-packages
        with:
          packages: packages/environments packages/local-mode

      - name: Build Storybook
        run: STORYBOOK_BASE_PATH=/web/main/ bun run build-storybook

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: web-storybook
          path: apps/web/storybook-static
          if-no-files-found: error

  deploy-storybooks:
    name: Deploy Storybooks
    needs: [build-design-library-storybook, build-web-storybook]
    # workflow_dispatch has no branch filter; guard the privileged publish.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download design-library Storybook
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: design-library-storybook
          path: firebase-storybook/design-library/main

      - name: Download web Storybook
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: web-storybook
          path: firebase-storybook/web/main

      - name: Validate Firebase deploy configuration
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER || secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT || secrets.GCP_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
        run: |
          missing=()
          for name in GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT GCP_PROJECT_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Firebase deploy configuration is missing: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER || secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT || secrets.GCP_SERVICE_ACCOUNT }}

      - name: Publish to Firebase Hosting
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          test -f firebase-storybook/design-library/main/index.html
          test -f firebase-storybook/web/main/index.html

          npx --yes firebase-tools@15.23.0 deploy \
            --project "${PROJECT_ID}" \
            --only hosting \
            --non-interactive

          echo "### Storybooks published" >> "$GITHUB_STEP_SUMMARY"
          echo "- https://${PROJECT_ID}.web.app/design-library/main/" >> "$GITHUB_STEP_SUMMARY"
          echo "- https://${PROJECT_ID}.web.app/web/main/" >> "$GITHUB_STEP_SUMMARY"
