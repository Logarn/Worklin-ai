<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <!-- viewport-fit=cover is required for iOS WKWebView to expose env(safe-area-inset-*);
       without it the Capacitor shell renders under the notch / home indicator. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0B0A" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="1024x1024" href="/favicon-white-on-navy.png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" sizes="1024x1024" href="/favicon-black-on-white.png" media="(prefers-color-scheme: light)" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>Worklin AI</title>
  <script src="/theme-init.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
